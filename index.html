<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معالجة كشوف الرقمنة</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

:root{
    --primary:#0284c7;
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --border:#e2e8f0;
}

body{
    margin:0;
    padding:20px;
    font-family:Tahoma,sans-serif;
    background:var(--bg);
    color:var(--text);
}

.container{
    max-width:1200px;
    margin:auto;
    background:var(--card);
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.05);
}

h1{
    text-align:center;
    color:var(--primary);
}

.upload-box{
    border:2px dashed var(--primary);
    padding:40px;
    border-radius:10px;
    text-align:center;
    position:relative;
    margin-bottom:20px;
    background:#eef8fc;
}

.upload-box input{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}

.status{
    background:#f1f5f9;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:var(--primary);
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 منظومة معالجة كشوف الرقمنة</h1>

<div class="upload-box">
    <b>📁 ارفع ملف Excel هنا</b>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<div class="status" id="status">
في انتظار رفع الملف...
</div>

<table id="resultTable" style="display:none;">

<thead>
<tr>
<th>المادة</th>
<th>عدد العلامات</th>
<th>الناجحون</th>
<th>الراسبون</th>
<th>نسبة النجاح</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const statusDiv = document.getElementById("status");
const resultTable = document.getElementById("resultTable");
const tableBody = document.getElementById("tableBody");

function cleanNumber(value){

    if(value === undefined || value === null){
        return NaN;
    }

    value = String(value)
        .replace(",", ".")
        .replace(/[^\d.-]/g, "");

    return parseFloat(value);
}

fileInput.addEventListener("change", async function(event){

    const file = event.target.files[0];

    if(!file){
        return;
    }

    statusDiv.innerHTML = "🔄 جاري معالجة الملف...";
    statusDiv.className = "status";

    tableBody.innerHTML = "";

    try{

        const data = await file.arrayBuffer();

        const workbook = XLSX.read(data,{
            type:"array"
        });

        let foundData = false;

        workbook.SheetNames.forEach(sheetName => {

            const worksheet = workbook.Sheets[sheetName];

            if(!worksheet){
                return;
            }

            const rows = XLSX.utils.sheet_to_json(worksheet,{
                header:1,
                defval:""
            });

            let total = 0;
            let success = 0;
            let fail = 0;

            rows.forEach(row => {

                if(!Array.isArray(row)){
                    return;
                }

                row.forEach(cell => {

                    const number = cleanNumber(cell);

                    if(!isNaN(number) && number >= 0 && number <= 20){

                        total++;

                        if(number >= 10){
                            success++;
                        }else{
                            fail++;
                        }
                    }
                });
            });

            if(total > 0){

                foundData = true;

                const rate = ((success / total) * 100).toFixed(2);

                tableBody.innerHTML += `
                <tr>
                    <td>${sheetName}</td>
                    <td>${total}</td>
                    <td>${success}</td>
                    <td>${fail}</td>
                    <td>${rate}%</td>
                </tr>
                `;
            }

        });

        if(!foundData){
            throw new Error("لم يتم العثور على علامات داخل الملف.");
        }

        resultTable.style.display = "table";

        statusDiv.innerHTML = "✅ تمت معالجة الملف بنجاح";
        statusDiv.classList.add("success");

    }catch(error){

        console.error(error);

        statusDiv.innerHTML = "❌ خطأ: " + error.message;
        statusDiv.classList.add("error");
    }

});

</script>

</body>
</html>
